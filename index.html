<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Profile card component</title>
</head>
<body>
  <div class="container">
    <div class="card-container">
      <img class="card-img" src="./images/bg-pattern-card.svg" alt="foto de um logo">
       <div class="card-image">
        <img class="img-victorr" src="./images/image-victor.jpg" alt="foto de um rapaz.">
       </div>      
       <h4>Victor Crest<span>26</span></h4>      
       <p class="text-london">London</p>

       <hr>
    
       <div class="container-like">
        <div class="card-followers">
          <p class="text-follow">80K</p>
          <p class="container-info">Followers</p>
        </div>
       
        <div class="card-likes">
          <p class="text-like">803K</p>
          <p class="card-info">Likes</p>
        </div>

        <div class="card-photos">
          <p class="text-photo">1.4K</p>
          <p class="card-info">Photos</p>  
        </div>  

       </div>
    </div>   
  </div>
 
</body>
</html>
